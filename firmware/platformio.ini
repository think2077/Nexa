; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:nexa_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 串口监控
monitor_speed = 115200

; 上传速度
upload_speed = 921600

; 分区表 - 需要足够空间存放 Web 页面和音频缓冲
board_build.partitions = default_8MB.csv

; 闪存大小 (根据实际板子调整)
board_flash_size = 8MB

; PSRAM 支持
board_has_psram = true
board_build.psram_type = opi

; 构建标志
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_USE_MALLOC=1
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFi/src
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFiClientSecure/src

; 依赖库
lib_deps =
    ; WebSocket 客户端
    Links2004/WebSockets@^2.3.7

    ; JSON 解析
    bblanchon/ArduinoJson@^7.0.3

    ; I2S 音频库
    ; 使用官方 ESP32 I2S 库

    ; WiFi 管理 (可选，用于配网)
    ; tzapu/WiFiManager@^0.16.0

    ; 框架内置库 (显式声明以便 LDF 正确解析依赖)
    WiFi
    WiFiClientSecure
    WebServer
    SPIFFS
    FS

; 框架
lib_ldf_mode = deep+
lib_compat_mode = strict
